<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AquarLLM · The Living City</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Silkscreen:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root { color-scheme: dark; --line: rgba(255,255,255,0.07); --panel: rgba(13,15,20,0.92); }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0c0d12; }
      body { font-family: "JetBrains Mono", ui-monospace, monospace; color: #d6dae2; }
      #app, #town { position: fixed; inset: 0; }
      #town { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

      header {
        position: fixed; top: 12px; left: 14px; z-index: 20;
        display: flex; align-items: baseline; gap: 10px; pointer-events: none;
      }
      header h1 { margin: 0; font-family: "Silkscreen", monospace; font-size: 18px; letter-spacing: 1px; color: #f6ecd2; }
      header .sub { font-size: 11px; color: #e0b48f; letter-spacing: 0.5px; }
      #status { font-size: 11px; }
      #status.ok { color: #4ade80; }
      #status.bad { color: #fbbf24; }

      #worlds {
        position: fixed; top: 44px; left: 14px; z-index: 20;
        display: flex; gap: 6px; flex-wrap: wrap; max-width: 300px;
      }
      #worlds button {
        cursor: pointer; font: 700 10.5px "JetBrains Mono", monospace;
        padding: 5px 10px; border-radius: 4px;
        background: #13161c; color: #8b93a0; border: 1px solid #272d38;
        transition: background 0.12s, border-color 0.12s, color 0.12s;
      }
      #worlds button.on { background: #1f2630; color: #e7d9bd; border-color: #5fb0ab; }

      /* Left activity panel */
      #log {
        position: fixed; left: 14px; top: 84px; bottom: 40px; width: 300px; z-index: 15;
        display: flex; flex-direction: column;
        background: var(--panel); border: 1px solid #232a35; border-radius: 10px;
        overflow: hidden; backdrop-filter: blur(6px);
      }
      #log[hidden] { display: none; }
      .lg-head {
        display: flex; align-items: center; justify-content: space-between;
        padding: 9px 12px; border-bottom: 1px solid var(--line);
        font: 700 11px "JetBrains Mono", monospace; color: #cdd3dc; letter-spacing: 0.5px;
      }
      .lg-head button {
        cursor: pointer; background: none; border: none; color: #7e8794;
        font-size: 15px; line-height: 1; padding: 0 2px;
      }
      .lg-head button:hover { color: #e2e7ee; }
      #lg-list { flex: 1; overflow-y: auto; padding: 4px 0; font-size: 10.5px; }
      .lg-row {
        display: grid; grid-template-columns: 52px 9px 1fr auto;
        align-items: baseline; gap: 6px; padding: 2px 12px; white-space: nowrap;
      }
      .lg-row + .lg-row { border-top: 1px solid rgba(255,255,255,0.03); }
      .lg-t { color: #5b636f; }
      .lg-dot { width: 7px; height: 7px; border-radius: 50%; align-self: center; }
      .lg-p { color: #e2e7ee; overflow: hidden; text-overflow: ellipsis; }
      .lg-a { font-weight: 600; }
      .lg-d { grid-column: 3 / 5; color: #7d8794; overflow: hidden; text-overflow: ellipsis; }

      .lg-legend { border-top: 1px solid var(--line); padding: 8px 12px; background: rgba(0,0,0,0.18); }
      .lg-legend-title { font: 700 9px "JetBrains Mono", monospace; color: #5b636f; letter-spacing: 0.6px; margin: 2px 0 5px; }
      .lg-keys { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 10px; margin-bottom: 4px; }
      .lg-key { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #aeb6c2; }
      .lg-sw { width: 9px; height: 9px; border-radius: 2px; flex: none; }
      .lg-key .lg-dot { align-self: auto; }
      .lg-kl { color: #d6dae2; }
      .lg-kw { color: #5b636f; font-size: 9px; }

      #lg-show {
        position: fixed; left: 14px; top: 84px; z-index: 15; cursor: pointer;
        font: 700 10.5px "JetBrains Mono", monospace; padding: 6px 11px; border-radius: 6px;
        background: var(--panel); color: #cdd3dc; border: 1px solid #232a35;
      }
      #lg-show[hidden] { display: none; }

      #hint {
        position: fixed; bottom: 12px; right: 252px; z-index: 15;
        font-size: 10.5px; color: #7e8794;
        background: rgba(12, 13, 18, 0.6); border: 1px solid #1e222c;
        border-radius: 4px; padding: 5px 9px; pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"><canvas id="town"></canvas></div>
    <header>
      <h1>AquarLLM</h1>
      <span class="sub">The Living City</span>
      <span id="status" class="bad">○ connecting…</span>
    </header>
    <div id="worlds">
      <button data-world="harbor">Harbor</button>
      <button data-world="cyber">Cyber</button>
      <button data-world="space">Orbital</button>
      <button data-world="fantasy">Isles</button>
      <button data-world="silicon">Silicon</button>
    </div>

    <button id="lg-show" hidden>▸ Activity</button>
    <aside id="log">
      <div class="lg-head"><span>ACTIVITY</span><button id="lg-hide" title="hide (L)">–</button></div>
      <div id="lg-list"></div>
      <div class="lg-legend">
        <div class="lg-legend-title">WHAT THEY'RE DOING</div>
        <div class="lg-keys" id="lg-acts"></div>
        <div class="lg-legend-title">AGENTS</div>
        <div class="lg-keys" id="lg-factions"></div>
      </div>
    </aside>

    <div id="hint">two-finger scroll / drag to pan · pinch to zoom · +/- · F to refit · L for log</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
